services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Point the app at the postgres service instead of localhost.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in your shell or .env file}
      # Persist the downloaded ONNX embedding model (all-MiniLM-L6-v2) across restarts
      # so it isn't re-fetched (~90 MB) on every cold start.
      SPRING_AI_EMBEDDING_TRANSFORMER_RESOURCE_CACHE_DIRECTORY: /models
    ports:
      - "8080:8080"
    volumes:
      - onnx-models:/models

volumes:
  postgres-data:
  onnx-models: